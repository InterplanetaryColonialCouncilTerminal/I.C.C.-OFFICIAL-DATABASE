<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.C.C. Terminal</title>
    </head>
<body>
    <script>
        // --- System State Management ---
        let currentMode = "COMMAND"; 
        let pendingFile = "";
        let idleTimer = null;
        let typewriterTimeout = null; 

        // --- New Audio File System ---
        function playAudioFile(fileName) {
            const audio = new Audio(fileName);
            audio.play().catch(e => console.error("Audio failed:", e));
        }

        // --- Original UI Synth Sounds ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTerminalSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.03);
                osc.start(now); osc.stop(now + 0.03);
            } else if (type === 'enter') {
                osc.type = 'square'; osc.frequency.setValueAtTime(450, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.25);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            }
        }

        // --- Core Functions ---
        function runTypewriter(elementOrId, text, speed, cb) {
            if (typewriterTimeout) clearTimeout(typewriterTimeout);
            let el = typeof elementOrId === "string" ? document.getElementById(elementOrId) : elementOrId;
            if (!el) return;
            let i = 0; el.textContent = "";
            function type() { 
                if (i < text.length) { 
                    el.textContent += text.charAt(i); i++; 
                    if (i % 3 === 0) playTerminalSound('click');
                    typewriterTimeout = setTimeout(type, speed); 
                } else { typewriterTimeout = null; if (cb) cb(); }
            }
            type();
        }

        // --- Input Handling & Command Logic ---
        const inputEl = document.getElementById('terminal-input');
        
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.trim().toLowerCase();
                const out = document.getElementById('output-box');
                
                // Audio command logic
                if (cmd === 'hello' || cmd === 'hi') {
                    playAudioFile('hello.mp3'); // Plays your file
                    out.style.display = "block";
                    runTypewriter(out, "GREETINGS, OPERATOR.", 6);
                } else if (cmd === 'clear') {
                    out.innerHTML = "";
                } else {
                    playTerminalSound('error');
                    out.style.display = "block";
                    runTypewriter(out, `COMMAND NOT FOUND: ${cmd}`, 8);
                }
                
                inputEl.value = "";
            }
        });

        // Initialize on interaction
        document.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
