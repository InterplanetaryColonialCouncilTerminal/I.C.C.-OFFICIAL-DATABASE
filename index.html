<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.C.C. Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        @keyframes crt-flicker { 0% { opacity: 0.98; } 50% { opacity: 1; } 100% { opacity: 0.99; } }
        @keyframes blink { 50% { border-color: transparent; } }
        
        body { background-color: #030200 !important; color: #ffb000; font-family: 'VT323', monospace; font-size: 24px; margin: 0; padding: 40px 20px; box-sizing: border-box; text-shadow: 0 0 6px rgba(255, 176, 0, 0.6); animation: crt-flicker 0.15s infinite; position: relative; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; z-index: 10; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%), radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%); background-size: 100% 5px, 100% 100%; }
        
        .terminal { max-width: 900px; margin: 0 auto; position: relative; z-index: 2; padding-top: 40px; }
        .power-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        
        .login-box { display: inline-flex; align-items: center; justify-content: center; border: 2px solid #ffb000; padding: 10px 20px; margin-top: 30px; position: relative; box-shadow: 0 0 10px rgba(255, 176, 0, 0.2); }
        .login-box input { background: transparent; border: none; color: #ffb000; font-family: 'VT323', monospace; font-size: 26px; outline: none; width: 140px; text-shadow: 0 0 6px rgba(255, 176, 0, 0.6); text-transform: uppercase; caret-color: transparent; }
        .login-box::after { content: ""; position: absolute; left: var(--login-cursor-pos, 135px); width: 12px; height: 24px; background: #ffb000; animation: blink 0.8s infinite; pointer-events: none; box-shadow: 0 0 6px rgba(255, 176, 0, 0.6); }

        .retro-btn { background: transparent; border: 2px solid #ffb000; color: #ffb000; font-family: 'VT323', monospace; font-size: 26px; padding: 10px 20px; cursor: pointer; text-shadow: 0 0 6px rgba(255, 176, 0, 0.6); margin: 20px 0; display: inline-block; }
        .retro-btn:hover { background-color: #ffb000; color: #000; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ffb000; padding: 10px; text-align: left; }
        th { background-color: rgba(255, 176, 0, 0.2); }
        
        .input-wrapper { display: flex; align-items: center; position: relative; width: 100%; }
        #terminal-input { background: transparent; border: none; color: #ffb000; font-family: 'VT323', monospace; font-size: 24px; outline: none; width: 100%; text-shadow: 0 0 6px rgba(255, 176, 0, 0.6); caret-color: transparent; }
        .input-wrapper::after { content: ""; position: absolute; left: var(--cursor-pos, 0px); width: 12px; height: 24px; background: #ffb000; animation: blink 0.8s infinite; pointer-events: none; box-shadow: 0 0 6px rgba(255, 176, 0, 0.6); display: inline-block; }
        
        #output-box { margin-top: 20px; padding: 15px; border: 1px solid #ffb000; background: rgba(255, 176, 0, 0.03); display: none; white-space: pre-wrap; }
        #file-content-screen { display: none; border: 1px dashed #ffb000; padding: 25px; background: rgba(255, 176, 0, 0.02); margin-top: 20px; white-space: pre-wrap; line-height: 1.4; }
        #intro-screen p { white-space: pre-wrap; margin: 4px 0; font-size: 22px; line-height: 1.3; }
        #screensaver { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #030200; z-index: 100; }
    </style>
</head>
<body>
    <canvas id="screensaver"></canvas>
    <div class="terminal">
        <div id="power-on-screen" class="power-screen">
            <p>I.C.C. MAINFRAME STATION 07</p>
            <div id="login-error-msg" style="color: #ff3333; height: 30px; margin-top: 15px;"></div>
            <div class="login-box" id="login-box-container">
                <span>IDENTITY PIN:&nbsp;</span>
                <input type="text" id="login-input" autocomplete="off" maxlength="12">
            </div>
            <p style="font-size: 18px; margin-top: 15px; opacity: 0.7;">[ Type GUEST and Press Enter ]</p>
        </div>

        <div id="intro-screen" style="display: none;"><p id="boot-1"></p><p id="boot-2"></p><p id="boot-3"></p></div>
        <div id="boot-header" style="display: none;">
            <p>I.C.C. DATABASE SYSTEM V1.0</p>
            <hr style="border: 1px dashed #ffb000;">
            <button id="btn-access" class="retro-btn">[ ACCESS MAIN DIRECTORY ]</button>
        </div>
        
        <div id="main-content" style="display: none;">
            <p>[ I.C.C. SECRET DIRECTORY ]</p>
            <table><thead><tr><th>ID</th><th>FILE NAME</th></tr></thead><tbody><tr><td>help</td><td>help.sys</td></tr></tbody></table>
            <div id="output-box"></div><br>
            <div class="input-wrapper"><span id="prompt-label">COMMAND:> &nbsp;</span><input type="text" id="terminal-input" autocomplete="off"></div>
        </div>
        
        <div id="file-content-screen">
            <div id="file-text-area"></div><br>
            <button id="btn-close-file" class="retro-btn">[ RETURN ]</button>
        </div>
    </div>

    <script>
        // Audio Engine
        function playVoiceClip(fileName) {
            const audio = new Audio(fileName);
            audio.play().catch(e => console.log("Audio waiting for interaction..."));
        }

        function playSound(type) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.03);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        // Logic
        const loginInput = document.getElementById('login-input');
        loginInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && loginInput.value.toLowerCase() === 'guest') {
                document.getElementById('power-on-screen').style.display = "none";
                document.getElementById('intro-screen').style.display = "block";
                // TRIGGER YOUR VOICE HERE:
                // playVoiceClip('hello.mp3'); 
                startBoot();
            }
        });

        function startBoot() {
            // Your existing boot logic here
            document.getElementById('boot-1').textContent = "INITIALIZING...";
            setTimeout(() => { document.getElementById('intro-screen').style.display = "none"; document.getElementById('boot-header').style.display = "block"; }, 2000);
        }

        document.getElementById('btn-access').addEventListener('click', () => {
            document.getElementById('boot-header').style.display = "none";
            document.getElementById('main-content').style.display = "block";
        });
    </script>
</body>
</html>
