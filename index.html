<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv='cache-control' content='no-cache'>
    <meta http-equiv='expires' content='0'>
    <meta http-equiv='pragma' content='no-cache'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal IBM 3151</title>
    <style>
        @import url('https://googleapis.com');

        @keyframes crt-flicker {
            0% { opacity: 0.985; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        body {
            background-color: #030200; 
            color: #ffb000; /* Âmbar IBM Clássico */
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            animation: crt-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 5px, 100% 100%;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 9;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255, 176, 0, 0.04) 0%, rgba(0,0,0,0) 70%);
        }

        .terminal {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .retro-btn {
            background: transparent;
            border: 2px solid #ffb000;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            box-shadow: 0 0 4px rgba(255, 176, 0, 0.3);
            margin: 20px 0;
            display: inline-block;
        }

        .retro-btn:hover {
            background-color: #ffb000;
            color: #000;
            text-shadow: none;
        }

        #main-content {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ffb000;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: rgba(255, 176, 0, 0.2);
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #terminal-input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            outline: none;
            width: 100%;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ffb000;
            background: rgba(255, 176, 0, 0.03);
            display: none;
            min-height: 80px;
        }

        /* Espaçamento para o botão de voltar */
        .nav-actions {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <p>IBM 3151 ASCII DISPLAY STATION — V1.0</p>
        <p>SISTEMA OPERATIVO RETRO CARREGADO COM SUCESSO.</p>
        <hr style="border: 1px dashed #ffb000;">
        
        <!-- Botão Inicial -->
        <button id="index-button" class="retro-btn" onclick="iniciarPainel()">[ ACEDER AO DIRETÓRIO PRINCIPAL ]</button>

        <div id="main-content">
            <p id="directory-title"></p>
            <p id="directory-subtitle"></p>

            <table id="directory-table" style="display:none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME DO FICHEIRO</th>
                        <th>DESCRIÇÃO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td>sobre_mim.txt</td>
                        <td>Informações sobre o autor do sistema.</td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td>notas.txt</td>
                        <td>Notas e atualizações do servidor.</td>
                    </tr>
                    <tr>
                        <td>ajuda</td>
                        <td>ajuda.sys</td>
                        <td>Mostra instruções de comandos.</td>
                    </tr>
                </tbody>
            </table>

            <div id="output-box"></div>
            
            <div class="input-line" id="cmd-line" style="display:none;">
                <span>COMANDO:> &nbsp;</span>
                <input type="text" id="terminal-input" placeholder="Digite o ID e pressione Enter..." autocomplete="off">
            </div>

            <!-- Novo Botão para Voltar ao Menu Inicial -->
            <div class="nav-actions">
                <button id="back-button" class="retro-btn" onclick="voltarMenu()">[ VOLTAR AO INÍCIO ]</button>
            </div>
        </div>
    </div>

    <script>
        function iniciarPainel() {
            document.getElementById('index-button').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            const titleEl = document.getElementById('directory-title');
            const subtitleEl = document.getElementById('directory-subtitle');
            
            titleEl.innerHTML = "[ DIRETÓRIO PRINCIPAL ]";
            subtitleEl.innerHTML = "Insira um ID no comando em baixo para ler um ficheiro de texto (ou digite 'menu' para voltar):";
            
            document.getElementById('directory-table').style.display = 'table';
            document.getElementById('cmd-line').style.display = 'flex';
            document.getElementById('output-box').style.display = 'none'; // Reseta caixa de texto
            document.getElementById('terminal-input').focus();
        }

        // Nova função para resetar o ecrã e voltar ao botão inicial
        function voltarMenu() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('index-button').style.display = 'inline-block';
            document.getElementById('terminal-input').value = '';
        }

        const ficheiros = {
            "01": "FICHEIRO: sobre_mim.txt<br>------------------<br>Olá! Eu sou o smiles035. Desenvolvi este sistema para simular a interface de um terminal clássico da IBM lançado originalmente em 1987.",
            "02": "FICHEIRO: notas.txt<br>-------------<br>[11/06/2026] - Sistema migrado com sucesso para o GitHub Pages.<br>[11/06/2026] - Atualizada a paleta de cores para Âmbar Fósforo.",
            "ajuda": "SISTEMA DE AJUDA IBM 3151<br>-------------------------<br>Digite '01' para ler o ficheiro sobre_mim.txt<br>Digite '02' para ler o ficheiro notas.txt<br>Digite 'menu' para retornar ao ecrã inicial.<br>Digite 'limpar' para fechar os ficheiros abertos."
        };

        const input = document.getElementById('terminal-input');
        const outputBox = document.getElementById('output-box');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const comando = input.value.trim().toLowerCase();
                
                if (comando === 'menu') {
                    voltarMenu();
                } else if (ficheiros[comando]) {
                    outputBox.innerHTML = ficheiros[comando];
                    outputBox.style.display = 'block';
                } else if (comando === 'limpar') {
                    outputBox.style.display = 'none';
                } else if (comando !== "") {
                    outputBox.innerHTML = `ERRO: O ID '${comando}' não foi reconhecido pelo sistema. Digite 'ajuda' para listar as opções.`;
                    outputBox.style.display = 'block';
                }
                input.value = '';
            }
        });

        document.addEventListener('click', () => {
            const cmdLine = document.getElementById('cmd-line');
            if (cmdLine && cmdLine.style.display === 'flex') {
                input.focus();
            }
        });
    </script>
</body>
</html>
