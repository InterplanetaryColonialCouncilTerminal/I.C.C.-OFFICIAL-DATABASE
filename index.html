<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal IBM 3151</title>
    <style>
        @import url('https://googleapis.com');

        @keyframes crt-flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        body {
            background-color: #030200; 
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            animation: crt-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 5px, 100% 100%;
        }

        .terminal {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .corner-logo {
            position: absolute;
            top: -20px;
            left: 0;
            max-width: 90px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.85;
            display: none;
        }

        .logo-container {
            display: block;
            margin: 25px auto;
            text-align: center;
        }

        .retro-logo {
            max-width: 260px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.9;
        }

        .retro-btn {
            background: transparent;
            border: 2px solid #ffb000;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            margin: 20px 0;
            display: inline-block;
        }

        .retro-btn:hover {
            background-color: #ffb000;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ffb000;
            padding: 10px;
            text-align: left;
        }

        th { background-color: rgba(255, 176, 0, 0.2); }

        .input-line { display: flex; align-items: center; }

        #terminal-input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            outline: none;
            width: 100%;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ffb000;
            background: rgba(255, 176, 0, 0.03);
            display: none;
        }

        .header-text { margin-left: 120px; }
        
        #intro-screen { display: none; }
        #power-on-screen { display: block; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="terminal">
        <img id="static-logo" src="logo.png" alt="Logo" class="corner-logo">

        <!-- BOTÃO DE ENERGIA (Garante que os sons funcionam sem bloqueio do browser) -->
        <div id="power-on-screen">
            <button class="retro-btn" onclick="ligarMonitor()">[ LIGAR TERMINAL IBM 3151 ]</button>
        </div>

        <!-- INTRO COM ANIMAÇÃO TYPEWRITER -->
        <div id="intro-screen">
            <p id="boot-1"></p>
            <p id="boot-2"></p>
            <p id="boot-3"></p>
            <div id="logo-area" class="logo-container" style="display: none;">
                <img src="logo.png" alt="Logo" class="retro-logo">
            </div>
        </div>

        <!-- MENU INICIAL -->
        <div id="boot-header" style="display: none;">
            <div class="header-text">
                <p>IBM 3151 ASCII DISPLAY STATION — V1.0</p>
                <p>SISTEMA OPERATIVO RETRO CARREGADO COM SUCESSO.</p>
                <hr style="border: 1px dashed #ffb000;">
                <button class="retro-btn" onclick="iniciarPainel()">[ ACEDER AO DIRETÓRIO PRINCIPAL ]</button>
            </div>
        </div>

        <!-- PAINEL DE COMANDOS (TABELA COM IDS OCULTOS) -->
        <div id="main-content" style="display: none;">
            <div class="header-text">
                <p>[ DIRETÓRIO SECRETO I.C.C. ]</p>
                <p>Aviso: Os IDs de ficheiros confidenciais estão ocultos do índice.</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME DO FICHEIRO</th>
                        <th>ESTADO DE ACESSO</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Os IDs 01 e 02 foram removidos daqui, mas funcionam no comando -->
                    <tr><td>ajuda</td><td>ajuda.sys</td><td>PÚBLICO</td></tr>
                    <tr><td>limpar</td><td>limpar.sys</td><td>PÚBLICO</td></tr>
                </tbody>
            </table>

            <div id="output-box"></div>
            <br>
            <div class="input-line">
                <span>COMANDO:> &nbsp;</span>
                <input type="text" id="terminal-input" autocomplete="off" placeholder="Insira credencial...">
            </div>
            <br>
            <button class="retro-btn" onclick="voltarMenu()">[ VOLTAR AO INÍCIO ]</button>
        </div>
    </div>

    <script>
        let audioCtx = null;

        // Gerador de Som das Teclas Mecânicas
        function playKeySound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(130, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch(e) {}
        }

        function playBeepSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(700, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        // Função de Escrita Letra a Letra com Som
        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            
            function type() {
                if (i < text.length) {
                    if (text.charAt(i) !== ' ') playKeySound();
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // Ligar o monitor e correr a Intro com som garantido
        function ligarMonitor() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playBeepSound();
            
            document.getElementById('power-on-screen').style.display = "none";
            document.getElementById('intro-screen').style.display = "block";

            // Inicia a sequência de boot falada letra a letra
            typeWriter("boot-1", "IBM BIOS CORE v0.87 - CORP 1987.", 30, () => {
                typeWriter("boot-2", "SYSTEM RAM: 640KB OK (SECURE CHANNEL ACTIVATED)", 20, () => {
                    playBeepSound();
                    document.getElementById('boot-3').innerHTML = "CONNECTING TO I.C.C. CODES CORE...";
                    document.getElementById('logo-area').style.display = "block";
                    
                    setTimeout(() => {
                        document.getElementById('intro-screen').style.display = "none";
                        document.getElementById('boot-header').style.display = "block";
                        document.getElementById('static-logo').style.display = "block";
                        playBeepSound();
                    }, 2500);
                });
            });
        }

        function iniciarPainel() {
            playBeepSound();
            document.getElementById('boot-header').style.display = "none";
            document.getElementById('main-content').style.display = "block";
            document.getElementById('output-box').style.display = "none";
